<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3C8A5B" />
  <title>RSH Geocaching</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>RSH Geocaching</h1>
    <span id="gps-status" class="gps-status">GPS wird gesucht…</span>
  </header>

  <main>
    <!-- Rules view -->
    <section id="view-rules" class="view" hidden>
      <div id="rules-content"></div>
      <p class="hint" style="margin-top:0.6rem">
        Dein Name: <strong id="rules-username-display"></strong>
        <button id="rules-change-name" type="button" class="link-btn">ändern</button>
      </p>
      <button id="rules-accept" class="btn btn-primary btn-big">Verstanden – los geht's</button>
      <button id="rules-reset" class="btn btn-ghost btn-big" style="margin-top:0.6rem">Fortschritt zurücksetzen</button>
    </section>

    <!-- Username-Onboarding view -->
    <section id="view-username" class="view" hidden>
      <div id="username-body"></div>
    </section>

    <!-- List view -->
    <section id="view-list" class="view" hidden>
      <ul id="cache-list" class="cache-list"></ul>
    </section>

    <!-- Map view -->
    <section id="view-map" class="view" hidden>
      <div id="map"></div>
      <div id="user-coords" class="coords-overlay" hidden>–</div>
    </section>

    <!-- Gehe-zu view: coordinate entry, then switches to the navigation view -->
    <section id="view-goto" class="view" hidden>
      <div id="goto-body"></div>
    </section>

    <!-- Detail / navigation view -->
    <section id="view-detail" class="view" hidden>
      <div id="nav-map" class="nav-map"></div>

      <div class="nav-topbar">
        <span id="nav-name" class="nav-name"></span>
        <span id="nav-dist" class="nav-dist">…</span>
        <svg id="nav-arrow" class="nav-arrow" width="30" height="30" viewBox="0 0 40 40"
             xmlns="http://www.w3.org/2000/svg" hidden>
          <polygon points="20,2 34,36 20,27 6,36" fill="#d6332b" stroke="#fff"
                   stroke-width="1.2" stroke-linejoin="round" />
        </svg>
        <button id="nav-info" class="nav-info-btn" type="button" aria-label="Beschreibung">i</button>
      </div>

      <div id="nav-info-pop" class="nav-info-pop" hidden></div>

      <div class="nav-mapctrl">
        <button id="nav-zoom-in" type="button" aria-label="Vergrößern">+</button>
        <button id="nav-zoom-out" type="button" aria-label="Verkleinern">−</button>
        <button id="nav-center" type="button" aria-label="Auf meinen Standort zentrieren">
          <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="12" cy="12" r="1.6" fill="currentColor" />
            <line x1="12" y1="1.5" x2="12" y2="5" stroke="currentColor" stroke-width="2" />
            <line x1="12" y1="19" x2="12" y2="22.5" stroke="currentColor" stroke-width="2" />
            <line x1="1.5" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2" />
            <line x1="19" y1="12" x2="22.5" y2="12" stroke="currentColor" stroke-width="2" />
          </svg>
        </button>
      </div>

      <div class="nav-botbar">
        <button id="nav-back" class="nav-back-btn" type="button">‹ Zurück</button>
        <button id="nav-log" class="nav-log-btn" type="button">📝 Log</button>
      </div>

      <div id="log-window" class="log-window" hidden>
        <div class="log-topbar">
          <button id="log-back" class="nav-back-btn" type="button">‹ Zurück</button>
          <span class="log-title">Log</span>
        </div>
        <div id="log-body" class="log-body"></div>
      </div>
    </section>

    <!-- Cache-Editor-View (Schüler lokale Caches) -->
    <section id="view-cache-editor" class="view" hidden>
      <div class="editor-topbar">
        <button id="editor-back" class="editor-back-btn" type="button">‹ Zurück</button>
        <span id="editor-title" class="editor-title"></span>
      </div>
      <div id="editor-body" class="editor-body"></div>
    </section>

    <!-- Teilen-View (eigenen Cache als QR anzeigen) -->
    <section id="view-share" class="view" hidden>
      <div class="editor-topbar">
        <button id="share-back" class="editor-back-btn" type="button">‹ Zurück</button>
        <span id="share-title" class="editor-title"></span>
      </div>
      <div id="share-body" class="editor-body"></div>
    </section>
  </main>

  <nav class="bottom-nav" id="bottom-nav" hidden>
    <button data-view="list" class="nav-btn">Liste</button>
    <button data-view="map" class="nav-btn">Karte</button>
    <button data-view="rules" class="nav-btn">Regeln</button>
    <button data-view="goto" class="nav-btn">📍 Gehe zu</button>
  </nav>

  <!-- Leaflet must load as a classic script (global `L`) before the modules. -->
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="vendor/qrcode/qrcode.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
